<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>导师列表 - 职脉深聊</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles/base.css">
  <link rel="stylesheet" href="/assets/styles/components.css">
  <link rel="stylesheet" href="/assets/styles/pages/mentors.css">
</head>
<body class="text-white">

  <!-- 导航栏 -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass" role="navigation" aria-label="主导航">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center space-x-3" aria-label="职脉深聊首页">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          </div>
          <span class="text-xl font-bold gradient-text">职脉深聊</span>
        </a>
        <div class="hidden md:flex items-center space-x-8">
          <a href="index.html" class="nav-link text-white/70 hover:text-white">首页</a>
          <a href="mentors.html" class="nav-link text-white active" aria-current="page">导师列表</a>
          <a href="privacy.html" class="nav-link text-white/70 hover:text-white">隐私与安全</a>
          <a href="verify.html" class="nav-link text-white/70 hover:text-white">成为导师</a>
        </div>
        <a href="chat.html" class="btn-primary px-6 py-2.5 rounded-full text-white font-medium">开始咨询</a>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="pt-28 pb-20 px-6">
    <div class="max-w-7xl mx-auto">

      <!-- 页头 -->
      <section class="text-center mb-12 fade-in">
        <h1 class="text-4xl lg:text-5xl font-bold mb-4">找到你的职场导师</h1>
        <p class="text-white/60 text-lg max-w-2xl mx-auto">各行业资深从业者在线，为你提供 1 对 1 专业指导</p>
      </section>

      <!-- 搜索和筛选 -->
      <section class="glass rounded-2xl p-6 mb-12 fade-in" aria-label="搜索和筛选">
        <div class="flex flex-col md:flex-row gap-4">
          <div class="flex-1">
            <label for="mentorSearch" class="sr-only">搜索导师</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="search" id="mentorSearch" placeholder="搜索导师姓名、公司、技能..." class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-white placeholder-white/40" aria-label="搜索导师">
            </div>
          </div>
          <div class="flex gap-4">
            <div class="w-40">
              <label for="filterIndustry" class="sr-only">筛选行业</label>
              <select id="filterIndustry" class="filter-select input-field w-full px-4 py-3 rounded-xl text-white bg-transparent" aria-label="筛选行业">
                <option value="">全部行业</option>
                <option value="互联网">互联网</option>
                <option value="科技">科技</option>
                <option value="金融">金融</option>
                <option value="社交媒体">社交媒体</option>
                <option value="本地生活">本地生活</option>
              </select>
            </div>
            <div class="w-40">
              <label for="filterPrice" class="sr-only">价格上限</label>
              <select id="filterPrice" class="filter-select input-field w-full px-4 py-3 rounded-xl text-white bg-transparent" aria-label="价格上限">
                <option value="">不限价格</option>
                <option value="300">¥300 以下</option>
                <option value="400">¥400 以下</option>
                <option value="500">¥500 以下</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- 导师列表容器（由 JS 渲染） -->
      <div id="mentorsContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" aria-live="polite" aria-label="导师列表">
        <!-- JS 渲染导师卡片 -->
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="glass border-t border-white/10 py-8">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center space-x-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center" aria-hidden="true">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          </div>
          <span class="text-sm text-white/50">© 2024 职脉深聊. 保留所有权利。</span>
        </div>
        <div class="flex items-center space-x-6 text-sm text-white/50">
          <a href="privacy.html" class="hover:text-white transition-colors">隐私政策</a>
          <a href="#" class="hover:text-white transition-colors">服务条款</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/assets/scripts/common/dom.js"></script>
  <script src="/assets/scripts/common/navigation.js"></script>
  <script src="/assets/data/mentors.js"></script>
  <script src="/assets/scripts/pages/mentors.js"></script>
  <script src="/assets/scripts/common/pwa.js"></script>
</body>
</html>
