<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>身份验证 - 成为导师 - 职脉深聊</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles/base.css">
  <link rel="stylesheet" href="/assets/styles/components.css">
  <link rel="stylesheet" href="/assets/styles/pages/verify.css">
</head>
<body class="text-white">

  <!-- 导航栏 -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass" role="navigation" aria-label="主导航">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center space-x-3" aria-label="职脉深聊首页">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          </div>
          <span class="text-xl font-bold gradient-text">职脉深聊</span>
        </a>
        <div class="hidden md:flex items-center space-x-8">
          <a href="index.html" class="nav-link text-white/70 hover:text-white">首页</a>
          <a href="mentors.html" class="nav-link text-white/70 hover:text-white">导师列表</a>
          <a href="privacy.html" class="nav-link text-white/70 hover:text-white">隐私与安全</a>
          <a href="verify.html" class="nav-link text-white active" aria-current="page">成为导师</a>
        </div>
        <a href="chat.html" class="btn-primary px-6 py-2.5 rounded-full text-white font-medium">开始咨询</a>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="pt-28 pb-20 px-6">
    <div class="max-w-2xl mx-auto">

      <!-- 页头 -->
      <section class="text-center mb-12 fade-in">
        <div class="inline-flex items-center glass-light px-4 py-2 rounded-full mb-6">
          <svg class="w-4 h-4 text-blue-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          <span class="text-sm text-white/80">成为认证导师</span>
        </div>
        <h1 class="text-3xl lg:text-4xl font-bold mb-4">申请成为导师</h1>
        <p class="text-white/60">填写以下信息，我们将在 3 个工作日内完成审核</p>
      </section>

      <!-- 表单 -->
      <form id="verifyForm" class="glass rounded-2xl p-8 space-y-6" novalidate>

        <!-- 基本信息 -->
        <fieldset class="space-y-4">
          <legend class="text-lg font-semibold mb-4">基本信息</legend>

          <div class="form-group">
            <label for="fullName" class="block text-sm font-medium text-white/80 mb-1">真实姓名 <span class="text-red-400">*</span></label>
            <input type="text" id="fullName" name="fullName" required minlength="2" maxlength="50"
              class="input-field w-full px-4 py-3 rounded-xl bg-transparent text-white placeholder-white/40"
              placeholder="请输入你的真实姓名"
              aria-required="true" aria-describedby="fullName-error">
            <p id="fullName-error" class="field-error" role="alert"></p>
          </div>

          <div class="form-group">
            <label for="email" class="block text-sm font-medium text-white/80 mb-1">工作邮箱 <span class="text-red-400">*</span></label>
            <input type="email" id="email" name="email" required
              class="input-field w-full px-4 py-3 rounded-xl bg-transparent text-white placeholder-white/40"
              placeholder="name@company.com"
              aria-required="true" aria-describedby="email-error email-hint">
            <p id="email-hint" class="text-white/40 text-xs mt-1">建议使用公司邮箱，可加速验证</p>
            <p id="email-error" class="field-error" role="alert"></p>
          </div>

          <div class="form-group">
            <label for="phone" class="block text-sm font-medium text-white/80 mb-1">手机号</label>
            <input type="tel" id="phone" name="phone" pattern="1[3-9]\d{9}"
              class="input-field w-full px-4 py-3 rounded-xl bg-transparent text-white placeholder-white/40"
              placeholder="13800138000"
              aria-describedby="phone-error">
            <p id="phone-error" class="field-error" role="alert"></p>
          </div>
        </fieldset>

        <!-- 职业信息 -->
        <fieldset class="space-y-4">
          <legend class="text-lg font-semibold mb-4">职业信息</legend>

          <div class="form-group">
            <label for="company" class="block text-sm font-medium text-white/80 mb-1">公司名称 <span class="text-red-400">*</span></label>
            <input type="text" id="company" name="company" required
              class="input-field w-full px-4 py-3 rounded-xl bg-transparent text-white placeholder-white/40"
              placeholder="例如：字节跳动"
              aria-required="true" aria-describedby="company-error">
            <p id="company-error" class="field-error" role="alert"></p>
          </div>

          <div class="form-group">
            <label for="title" class="block text-sm font-medium text-white/80 mb-1">职位 <span class="text-red-400">*</span></label>
            <input type="text" id="title" name="title" required
              class="input-field w-full px-4 py-3 rounded-xl bg-transparent text-white placeholder-white/40"
              placeholder="例如：产品总监"
              aria-required="true" aria-describedby="title-error">
            <p id="title-error" class="field-error" role="alert"></p>
          </div>

          <div class="form-group">
            <label for="bio" class="block text-sm font-medium text-white/80 mb-1">个人简介</label>
            <textarea id="bio" name="bio" rows="3" maxlength="500"
              class="input-field w-full px-4 py-3 rounded-xl bg-transparent text-white placeholder-white/40 resize-none"
              placeholder="简要介绍你的专业背景和擅长领域..."
              aria-describedby="bio-error bio-count"></textarea>
            <div class="flex justify-between mt-1">
              <p id="bio-error" class="field-error" role="alert"></p>
              <p id="bio-count" class="text-white/40 text-xs">0/500</p>
            </div>
          </div>
        </fieldset>

        <!-- 身份验证文件 -->
        <fieldset class="space-y-4">
          <legend class="text-lg font-semibold mb-4">身份验证</legend>
          <p class="text-white/50 text-sm">上传工牌或在职证明，仅用于身份验证，验证完成后将删除原始文件</p>

          <div class="form-group">
            <label class="block text-sm font-medium text-white/80 mb-2">工牌/在职证明</label>
            <div class="upload-zone" role="button" tabindex="0" aria-label="点击上传工牌或在职证明">
              <input type="file" id="fileUpload" name="fileUpload" accept="image/jpeg,image/png,image/webp,application/pdf" aria-describedby="file-hint">
              <svg class="w-8 h-8 text-white/40 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
              <p class="text-white/60 text-sm">点击或拖拽上传</p>
              <p id="file-hint" class="text-white/40 text-xs mt-1">支持 JPG、PNG、WebP、PDF，最大 5MB</p>
              <p class="file-name"></p>
            </div>
          </div>
        </fieldset>

        <!-- 协议 -->
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="agree" name="agree" required aria-required="true" aria-describedby="agree-error">
            <span>我已阅读并同意 <a href="privacy.html" class="text-blue-400 hover:underline" target="_blank">隐私政策</a> 和 <a href="#" class="text-blue-400 hover:underline">服务条款</a></span>
          </label>
          <p id="agree-error" class="field-error" role="alert"></p>
        </div>

        <!-- 提交 -->
        <button type="submit" id="submitBtn" class="btn-primary w-full py-4 rounded-xl text-white font-semibold text-lg">
          提交申请
        </button>

        <!-- 进度条 -->
        <div class="progress-bar hidden" id="progressBar">
          <div class="progress-bar-fill" style="width: 0%"></div>
        </div>
      </form>

      <!-- 成功视图 -->
      <div id="successView" class="glass rounded-2xl p-8 text-center">
        <div class="w-20 h-20 rounded-full bg-green-500/20 flex items-center justify-center mx-auto mb-6">
          <svg class="w-10 h-10 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2xl font-bold mb-3">申请已提交</h2>
        <p class="text-white/60 mb-6">我们已收到你的申请，将在 <strong class="text-white">3 个工作日</strong>内完成审核。<br>审核结果将通过邮件通知你。</p>
        <a href="index.html" class="btn-primary px-8 py-3 rounded-xl font-medium inline-block">返回首页</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="glass border-t border-white/10 py-8">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center space-x-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center" aria-hidden="true">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          </div>
          <span class="text-sm text-white/50">© 2024 职脉深聊. 保留所有权利。</span>
        </div>
        <div class="flex items-center space-x-6 text-sm text-white/50">
          <a href="privacy.html" class="hover:text-white transition-colors">隐私政策</a>
          <a href="#" class="hover:text-white transition-colors">服务条款</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/assets/scripts/common/dom.js"></script>
  <script src="/assets/scripts/common/navigation.js"></script>
  <script src="/assets/scripts/pages/verify.js"></script>
  <script>
    // 简介字符计数
    (function () {
      var bio = document.getElementById('bio');
      var count = document.getElementById('bio-count');
      if (bio && count) {
        bio.addEventListener('input', function () {
          count.textContent = this.value.length + '/500';
        });
      }
    })();
  </script>
  <script src="/assets/scripts/common/pwa.js"></script>
</body>
</html>
